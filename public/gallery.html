<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery 📸</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Gallery specific styles */
    .gallery-wrapper {
      width: 100%;
      max-width: 1200px;
      text-align: center;
    }

    .gallery-title {
      font-family: 'Great Vibes', cursive;
      font-size: 3rem;
      color: var(--deep-rose);
      margin-bottom: 5px;
    }

    .gallery-subtitle {
      color: var(--warm-gold);
      font-size: 1.05rem;
      margin-bottom: 30px;
      font-weight: 300;
    }

    /* Placeholder gallery as fallback */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
      width: 100%;
    }

    .photo-card {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px var(--shadow-rose);
      border: 2px solid rgba(255, 255, 255, 0.6);
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      background: linear-gradient(135deg, var(--blush), var(--cream));
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
    }

    .photo-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 20px 50px var(--shadow-rose);
    }

    .photo-card .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      position: relative;
      overflow: hidden;
    }

    .photo-card .photo-placeholder::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, var(--soft-pink), var(--blush));
      opacity: 0.5;
      z-index: 0;
    }

    .photo-card .photo-icon {
      position: relative;
      z-index: 1;
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .photo-card .photo-label {
      position: relative;
      z-index: 1;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      color: var(--deep-rose);
      font-weight: 500;
    }

    .photo-card .photo-num {
      position: absolute;
      top: 10px;
      right: 12px;
      font-family: 'Great Vibes', cursive;
      font-size: 1.3rem;
      color: var(--warm-gold);
      z-index: 1;
    }

    /* 3D Carousel container */
    #threeCarousel {
      width: 100%;
      height: 520px;
      position: relative;
      margin-bottom: 20px;
    }

    .carousel-controls {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
    }

    .carousel-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid var(--deep-rose);
      background: rgba(255, 255, 255, 0.8);
      color: var(--deep-rose);
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .carousel-btn:hover {
      background: var(--gradient-romantic);
      color: white;
      border-color: transparent;
      transform: scale(1.1);
      box-shadow: 0 6px 20px var(--shadow-rose);
    }

    .carousel-indicator {
      font-family: 'Montserrat', sans-serif;
      color: var(--deep-rose);
      font-weight: 500;
      font-size: 0.95rem;
    }    /* Photo card animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .photo-card {
      animation: fadeInUp 0.6s ease both;
    }

    /* Tab toggle */
      .view-toggle {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 25px;
    }

    .toggle-btn {
      padding: 8px 20px;
      border: 2px solid var(--deep-rose);
      border-radius: 50px;
      background: transparent;
      color: var(--deep-rose);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .toggle-btn.active {
      background: var(--gradient-romantic);
      color: white;
      border-color: transparent;
    }

    .toggle-btn:hover:not(.active) {
      background: rgba(199, 91, 122, 0.1);
    }
  </style>
</head>
<body>
  <!-- Floating particles background -->
  <div class="particles-bg" id="particlesBg"></div>

  <a href="/" class="back-btn" style="position:fixed; top:25px; left:25px; z-index:100; text-decoration:none;">← Back</a>

  <!-- Gallery Page -->
  <div class="page active" id="galleryPage">
    <div class="gallery-wrapper">
      <h1 class="gallery-title">Beautiful Moments</h1>
      <p class="gallery-subtitle">✨ A collection of precious memories ✨</p>

      <!-- View toggle -->
      <div class="view-toggle">
        <button class="toggle-btn active" onclick="showView('carousel')">🎠 3D Carousel</button>
        <button class="toggle-btn" onclick="showView('grid')">📸 Grid View</button>
      </div>

      <!-- 3D Carousel view -->
      <div id="carouselView">
        <div id="threeCarousel"></div>
        <div class="carousel-controls">
          <button class="carousel-btn" onclick="rotateCarousel(-1)">◀</button>
          <span class="carousel-indicator" id="carouselIndicator">1 / 10</span>
          <button class="carousel-btn" onclick="rotateCarousel(1)">▶</button>
        </div>
        <p style="color: var(--warm-gold); font-size: 0.9rem; margin-top: 15px; font-weight: 300;">
          💫 Drag to rotate • Click a photo to view
        </p>
      </div>

      <!-- Grid view (hidden by default) -->
      <div id="gridView" style="display: none;">
        <div class="photo-grid" id="photoGrid"></div>
      </div>
    </div>
  </div>

  <div id="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; cursor:pointer; backdrop-filter:blur(10px);">
    <div id="lightboxContent" style="max-width:90vw; max-height:90vh; border-radius:20px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.5); border:3px solid rgba(255,255,255,0.3); position:relative;"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Hidden YouTube player for music -->
  <div id="youtubePlayer"></div>

  <!-- Music toggle button -->
  <button class="music-btn" id="musicToggleBtn" onclick="toggleMusic()">
    <span class="music-icon">🎶</span>
    <span class="music-label">Play Music</span>
  </button>

  <script src="/js/main.js"></script>
  <script src="/js/gallery.js"></script>
  <script src="/js/player.js"></script>
</body>
</html>
